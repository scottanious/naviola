  <!-- Template image — macOS will color it automatically -->
  <g fill="black">
    <!-- Music note -->
    <ellipse cx="5.5" cy="11.5" rx="3" ry="2.2" transform="rotate(-10, 5.5, 11.5)"/>
    <rect x="8" y="3" width="1.5" height="9" rx="0.75"/>
    <path d="M8.5,3.5 L14,2 L14,5 L8.5,6.5 Z"/>
    <!-- Small play triangle -->
