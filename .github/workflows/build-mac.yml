name: Build macOS

on: [push]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Set env
        run: |
          echo "RELEASE_DATE=$(date +%Y.%m.%d_%H.%M.%S)" >> ${GITHUB_ENV}
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

          echo "COMMIT_URL=${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"  >> $GITHUB_ENV
          echo "COMMIT_TXT=$(echo ${{ github.sha }} | cut -c-7)"  >> $GITHUB_ENV

          echo "BUILD_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"  >> $GITHUB_ENV
          echo "BUILD_TXT=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

          [[ "${GITHUB_REF_TYPE}"  = "tag" ]] && echo ARTIFACT_NAME="Naviola-${GITHUB_REF_NAME:1}" >> $GITHUB_ENV
          [[ "${GITHUB_REF_TYPE}" != "tag" ]] && echo ARTIFACT_NAME="Naviola-$(date +%Y.%m.%d_%H.%M.%S)" >> $GITHUB_ENV

          echo "==============================="
          uname -a
          echo "==============================="
          export
          echo "-------------------------------"
          cat $GITHUB_ENV
          echo "==============================="

      - name: Check tag
        run: |
          if [[ "${GITHUB_REF_TYPE}"  = "tag" ]] ; then \
            echo ${GITHUB_REF_NAME} | grep -q "^v[0-9]\+\.[0-9]\+\.[0-9]\+$" || ( echo "Incorrect tag ${GITHUB_REF_NAME}" ; false ) \
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update Credits.html
        run: |
          sed -i '' "s|<build-info>|Commit: <a href='${COMMIT_URL}'>${COMMIT_TXT}</a>  Build: <a href='${BUILD_URL}'>#${BUILD_TXT}</a>|" Radiola/Credits.html || true

      - name: Build
        run: ./build.sh prepare build copyApp createDmg

      - name: Prepare artifacts
        run: |
          echo "RELEASE_DATE=${RELEASE_DATE}"       >> build/metadata.txt
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> build/metadata.txt
          echo "COMMIT_URL=${COMMIT_URL}"           >> build/metadata.txt
          echo "COMMIT_TXT=${COMMIT_TXT}"           >> build/metadata.txt
          echo "BUILD_URL=${BUILD_URL}"             >> build/metadata.txt
          echo "BUILD_TXT=${BUILD_TXT}"             >> build/metadata.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}"     >> build/metadata.txt

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            build/*.dmg
            build/metadata.txt

      - name: Upload release asset
        if: github.ref_type == 'tag'
        run: gh release upload "${{ github.ref_name }}" build/*.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
